<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ダメージシミュレーター</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 0; /* paddingをcontainer側に移動 */
        }

        /* 固定エリアのラッパー */
        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background-color: var(--bg-color);
            padding: 20px 20px 10px 20px;
            box-shadow: 0 4px 6px -4px rgba(0,0,0,0.1);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px 20px 20px;
        }

        .top-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-bottom: 10px;
            gap: 10px;
            font-size: 0.875rem;
            font-weight: bold;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 22px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #cbd5e1;
            transition: .4s;
            border-radius: 22px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--primary-color);
        }

        input:checked + .slider:before {
            transform: translateX(22px);
        }

        header h1 {
            text-align: center;
            margin: 0 0 15px 0;
            font-size: 1.5rem;
        }

        .card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            margin-bottom: 20px;
        }

        /* 固定されるカードの余白調整 */
        .sticky-header .card {
            margin-bottom: 0;
        }

        h2 {
            margin-top: 0;
            font-size: 1.1rem;
            border-left: 4px solid var(--primary-color);
            padding-left: 10px;
            color: #1e40af;
            margin-bottom: 15px;
        }

.grid {
    display: grid;
    gap: 12px;
    /* デフォルト：スマホ（1列） */
    grid-template-columns: 1fr;
}

/* タブレット：画面幅 600px 以上で2列 */
@media (min-width: 600px) {
    .grid {
        grid-template-columns: repeat(2, 1fr);
    }
}

/* PC：画面幅 992px 以上で4列 */
@media (min-width: 992px) {
    .grid {
        grid-template-columns: repeat(4, 1fr);
    }
}

        .input-group {
            margin-bottom: 0;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .styled-input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 0.95rem;
            transition: all 0.2s;
            background-color: #fff;
            cursor: pointer;
        }

        .styled-input:hover { border-color: #cbd5e1; background-color: #fdfdfd; }
        .styled-input:focus { outline: none; border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }

        .result-box {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 0.85rem;
        }

        th, td { padding: 10px; text-align: left; border-bottom: 1px solid var(--border-color); }
        th { background: #f1f5f9; color: #475569; }
        .highlight { font-weight: bold; color: var(--primary-color); }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; background: #e2e8f0; }
    </style>
</head>
<body>

<div class="sticky-header">
    <div class="container" style="padding-bottom: 0;">
        <div class="top-bar">
            <span>桁区切り表示</span>
            <label class="switch">
                <input type="checkbox" id="comma_toggle" checked onchange="handleCommaToggle()">
                <span class="slider"></span>
            </label>
        </div>

        <header>
            <h1>カゲマス 討伐イベント ダメージシミュレーター</h1>
        </header>

        <div class="card">
            <h2 style="display: flex; justify-content: space-between; align-items: center;">
                1. ボスHP・ボーナス設定
                <button onclick="resetSettings()" style="font-size: 0.7rem; padding: 2px 8px; cursor: pointer; border: 1px solid #bfdbfe; background: #eff6ff; border-radius: 4px; color: #1e40af;">初期値に戻す</button>
            </h2>
            <div class="grid">
                <div class="input-group">
                    <label>ボーナススコア (%)</label>
                    <input type="text" id="bonus" class="styled-input" data-step="1">
                </div>
                <div class="input-group">
                    <label>ノーマル 最大HP</label>
                    <input type="text" id="hp_n" class="styled-input" data-step="100000">
                </div>
                <div class="input-group">
                    <label>ハード 最大HP</label>
                    <input type="text" id="hp_h" class="styled-input" data-step="100000">
                </div>
                <div class="input-group">
                    <label>ベリーハード 最大HP</label>
                    <input type="text" id="hp_vh" class="styled-input" data-step="1000000">
                </div>
            </div>
        </div>
    </div>
</div>

<div class="container" style="padding-top: 20px;">
    <div class="card">
        <h2>2. 難易度移行の損益分岐ライン</h2>
        <table>
            <thead>
                <tr>
                    <th>ステップ</th>
                    <th>重視項目</th>
                    <th>上位での必要ダメージ率</th>
                    <th>必要ダメージ量</th>
                </tr>
            </thead>
            <tbody id="step-results"></tbody>
        </table>
    </div>

    <div class="card">
        <h2>3. 現在の火力シミュレーション</h2>
<div class="grid">
       <div class="input-group">
    <label>挑戦難易度</label>
    <select id="sim_mode" class="styled-input" onchange="handleModeChange()">
        <option value="N">ノーマル</option>
        <option value="H">ハード</option>
        <option value="VH" selected>ベリーハード</option>
    </select>
</div>
<div class="input-group">
    <label>ブースト倍率</label>
    <select id="boost_rate" class="styled-input" onchange="calculate()">
        <option value="1">×1</option>
        <option value="2">×2</option>
        <option value="3">×3</option>
        <option value="4">×4</option>
        <option value="5" selected>×5</option>
    </select>
</div>
            <div class="input-group">
                <label>与ダメージ量</label>
                <input type="text" id="current_dmg" class="styled-input" 
                    onfocus="this.value = parseNum(this.value);"
                    onblur="this.value = formatNum(parseNum(this.value));">            </div>
            <div class="input-group">
                <label>ダメージ率 (%)</label>
                <input type="text" id="current_rate" class="styled-input" data-step="1" onblur="syncDmgFromRate()">            </div>
        </div>
        <div id="sim_result" class="result-box"></div>
    </div>
</div>

<script>
    const CONFIG = {
        storageKey: 'raid_calc_settings',
        init: { bonus: 0, comma: true, mode: 'VH' },
        stats: {
            N:  { ticket: 60,  gp: 50,   score: 30000 },
            H:  { ticket: 90,  gp: 250,  score: 85000 },
            VH: { ticket: 120, gp: 1100, score: 300000 }
        }
    };

    let bossData = null;
    let calculatedLines = { NH: 0, HVH: 0 };

async function init() {
    try {
        const response = await fetch('boss_data.json');
        if (!response.ok) throw new Error('Network response was not ok');
        bossData = await response.json();
        
        // 1. ローカルストレージ読み込み
        const saved = localStorage.getItem(CONFIG.storageKey);
        
        if (saved) {
            const s = JSON.parse(saved);
            document.getElementById('comma_toggle').checked = s.comma;
            document.getElementById('bonus').value = s.bonus || 0;
            document.getElementById('hp_n').value = formatNum(s.hp_n || bossData.N.hp);
            document.getElementById('hp_h').value = formatNum(s.hp_h || bossData.H.hp);
            document.getElementById('hp_vh').value = formatNum(s.hp_vh || bossData.VH.hp);
            document.getElementById('sim_mode').value = s.mode || 'VH';
            document.getElementById('boost_rate').value = s.boost || 5;
            document.getElementById('current_dmg').value = formatNum(s.dmg || 0);
            document.getElementById('current_rate').value = s.rate || 0;
        } else {
            // 初回起動時：各フォームに初期値（0またはJSONの値）を代入
            document.getElementById('bonus').value = 0;
            document.getElementById('hp_n').value = formatNum(bossData.N.hp);
            document.getElementById('hp_h').value = formatNum(bossData.H.hp);
            document.getElementById('hp_vh').value = formatNum(bossData.VH.hp);
            document.getElementById('current_dmg').value = 0;
            document.getElementById('current_rate').value = 0;
        }

        // 2. イベントリスナー登録
        const inputIds = ['comma_toggle', 'bonus', 'hp_n', 'hp_h', 'hp_vh', 'sim_mode', 'boost_rate', 'current_dmg'];
        inputIds.forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                // 入力があるたびに保存と計算を走らせる
                el.addEventListener('input', () => {
                    saveSettings();
                    updateAll();
                });
                el.addEventListener('change', saveSettings);
            }
        });

        // 3. 確実に計算を実行
        updateAll();
        
    } catch (e) {
        console.error("初期化エラー:", e);
    }
}

    // --- イベント制御の一括管理 ---
    function handleSelectOperation(el, delta, key) {
        const idx = el.selectedIndex;
        if (delta < 0 || key === 'ArrowUp') {
            if (idx > 0) el.selectedIndex = idx - 1;
        } else {
            if (idx < el.options.length - 1) el.selectedIndex = idx + 1;
        }
        el.dispatchEvent(new Event('change'));
    }

    document.addEventListener('wheel', function(e) {
        if (e.target.id === 'sim_mode' || e.target.id === 'boost_rate') {
            e.preventDefault();
            handleSelectOperation(e.target, e.deltaY, null);
        }
    }, { passive: false });

    document.addEventListener('keydown', function(e) {
        const el = document.activeElement;
        if ((el.id === 'sim_mode' || el.id === 'boost_rate') && (e.key === 'ArrowUp' || e.key === 'ArrowDown')) {
            e.preventDefault();
            handleSelectOperation(el, 0, e.key);
        }
    });

    function formatNum(num, isRate = false) {
        if (isRate) return parseFloat(num).toFixed(1);
        if (!document.getElementById('comma_toggle').checked) return Math.floor(num).toString();
        return Math.floor(num).toLocaleString('ja-JP');
    }

function parseNum(str) {
    if (!str) return 0;
    // 1. 全角を半角に変換
    let s = str.toString().replace(/[０-９]/g, (s) => String.fromCharCode(s.charCodeAt(0) - 0xFEE0));
    // 2. 数字と小数点以外（カンマ等）を全て削除
    s = s.replace(/[^0-9.]/g, '');
    
    const val = parseFloat(s);
    return isNaN(val) ? 0 : val;
}

function saveSettings() {
    const settings = {
        comma: document.getElementById('comma_toggle').checked,
        bonus: parseNum(document.getElementById('bonus').value).toString(),
        hp_n:  parseNum(document.getElementById('hp_n').value).toString(),
        hp_h:  parseNum(document.getElementById('hp_h').value).toString(),
        hp_vh: parseNum(document.getElementById('hp_vh').value).toString(),
        mode:  document.getElementById('sim_mode').value,
        boost: document.getElementById('boost_rate').value,
        dmg:   parseNum(document.getElementById('current_dmg').value).toString()
    };
    localStorage.setItem(CONFIG.storageKey, JSON.stringify(settings));
}

    function loadSettings() {
        const saved = localStorage.getItem(CONFIG.storageKey);
        if (!saved) return null;
        return JSON.parse(saved);
    }

    function initInputs() {
        const saved = localStorage.getItem(CONFIG.storageKey);
        if (!saved) return;
        const s = JSON.parse(saved);

        // 各項目に値を反映する際、formatNum を通す
        document.getElementById('comma_toggle').checked = s.comma;
        document.getElementById('bonus').value = formatNum(s.bonus);
        document.getElementById('hp_n').value = formatNum(s.hp_n);
        document.getElementById('hp_h').value = formatNum(s.hp_h);
        document.getElementById('hp_vh').value = formatNum(s.hp_vh);
        document.getElementById('sim_mode').value = s.mode;
        document.getElementById('boost_rate').value = s.boost;
        document.getElementById('current_dmg').value = formatNum(s.dmg);

        // 入力時のフォーカス/ブラー処理は既存のまま
        document.querySelectorAll('.styled-input').forEach(input => {
            if (input.tagName === 'SELECT') return;
            input.addEventListener('focus', function() { this.value = parseNum(this.value); });
            input.addEventListener('blur', function() {
                const isRate = (this.id === 'current_rate');
                this.value = formatNum(parseNum(this.value), isRate);
            });
        });
    }

function resetSettings() {
        if (!confirm('ボーナスとボスHPを初期値に戻しますか？')) return;

        document.getElementById('bonus').value = 0;
        if (bossData) {
            document.getElementById('hp_n').value = formatNum(bossData.N.hp);
            document.getElementById('hp_h').value = formatNum(bossData.H.hp);
            document.getElementById('hp_vh').value = formatNum(bossData.VH.hp);
        }

        // 状態をクリーンな状態で保存
        saveSettings();
        updateAll();
    }

    function handleCommaToggle() { saveSettings(); refreshAllDisplay(); }
    function handleModeChange() { saveSettings(); syncDmgFromRate(); }

    function syncRateFromDmg() {
        const dmg = parseNum(document.getElementById('current_dmg').value);
        const mode = document.getElementById('sim_mode').value;
        const hp = bossData[mode].hp;
        const rate = hp > 0 ? (dmg / hp) * 100 : 0;
        document.getElementById('current_rate').value = rate.toFixed(1);
        calculate();
    }

function syncDmgFromRate() {
    const el = document.getElementById('current_rate');
    const rate = parseNum(el.value);
    const mode = document.getElementById('sim_mode').value;
    const hp = bossData[mode].hp;
    
    // 計算
    const dmg = Math.floor(hp * (rate / 100));
    
    // フォームに反映（カンマ区切りなどを適用）
    document.getElementById('current_dmg').value = formatNum(dmg);
    
    // 表示の整形（入力された数値を正しく表示）
    el.value = rate.toFixed(1);
    
    // 最終計算
    calculate();
}

    function updateAll() { saveSettings(); calculateLines(); calculate(); }

    function refreshAllDisplay() {
        document.querySelectorAll('input[type="text"]').forEach(input => {
            const isRate = (input.id === 'current_rate');
            input.value = formatNum(parseNum(input.value), isRate);
        });
        calculateLines();
        calculate();
    }

function calculateLines() {
    if (!bossData) return;
    
    // 1. 最新のHPをフォームから取得
    const currentHP = {
        N: parseNum(document.getElementById('hp_n').value),
        H: parseNum(document.getElementById('hp_h').value),
        VH: parseNum(document.getElementById('hp_vh').value)
    };
    
    const bonus = (parseNum(document.getElementById('bonus').value) / 100) + 1;
    
    // 2. dataオブジェクトを最新のHPで作成
    const data = { 
        N: { ...CONFIG.stats.N, hp: currentHP.N }, 
        H: { ...CONFIG.stats.H, hp: currentHP.H }, 
        VH: { ...CONFIG.stats.VH, hp: currentHP.VH } 
    };
    
    // 3. 以降は既存のロジックで計算
    const getLine = (low, high) => {
        // ... (省略：既存のロジックをそのまま使用)
        const lowMaxGP_per_ticket = data[low].gp / data[low].ticket;
        const gpRate = data[high].gp > 0 ? ((lowMaxGP_per_ticket * data[high].ticket) / data[high].gp) : 0;
        const lowMaxScore_per_ticket = (data[low].score * 2) / data[low].ticket;
        const scoreRate = (data[high].score > 0 && bonus > 0) ? ((lowMaxScore_per_ticket * data[high].ticket) / bonus / data[high].score) : 0;
        return { gpRate: gpRate * 100, scoreRate: scoreRate * 100, gpDmg: data[high].hp * gpRate, scoreDmg: data[high].hp * scoreRate };
    };
        const lineNH = getLine('N', 'H');
        const lineHVH = getLine('H', 'VH');
        calculatedLines.NH = lineNH.scoreDmg;
        calculatedLines.HVH = lineHVH.scoreDmg;
        document.getElementById('step-results').innerHTML = `
            <tr><td><span class="badge">N → H</span></td><td>ギルドポイント</td><td class="highlight">${lineNH.gpRate.toFixed(1)}%</td><td>${formatNum(lineNH.gpDmg)}</td></tr>
            <tr><td><span class="badge">N → H</span></td><td>討伐スコア</td><td class="highlight">${lineNH.scoreRate.toFixed(1)}%</td><td>${formatNum(lineNH.scoreDmg)}</td></tr>
            <tr><td><span class="badge">H → VH</span></td><td>ギルドポイント</td><td class="highlight">${lineHVH.gpRate.toFixed(1)}%</td><td>${formatNum(lineHVH.gpDmg)}</td></tr>
            <tr><td><span class="badge">H → VH</span></td><td>討伐スコア</td><td class="highlight">${lineHVH.scoreRate.toFixed(1)}%</td><td>${formatNum(lineHVH.scoreDmg)}</td></tr>
        `;
    }

function calculate() {
    if (!bossData) return;

// 1. 入力値の取得
    const bonus = parseNum(document.getElementById('bonus').value);
    const bonusRate = (bonus / 100) + 1;
    const curDmg = parseNum(document.getElementById('current_dmg').value);
    const simMode = document.getElementById('sim_mode').value;
    const boost = parseInt(document.getElementById('boost_rate').value);

    // フォームから最新のHPを取得（空の場合はJSONの初期値で補完）
    const hpMap = {
        'N':  parseNum(document.getElementById('hp_n').value)  || bossData.N.hp,
        'H':  parseNum(document.getElementById('hp_h').value)  || bossData.H.hp,
        'VH': parseNum(document.getElementById('hp_vh').value) || bossData.VH.hp
    };
    
    const target = { ...CONFIG.stats[simMode], hp: hpMap[simMode] };
    
    const config = {
        N:  { base: 30000, min: 10000, max: 60000 },
        H:  { base: 85000, min: 15000, max: 170000 },
        VH: { base: 300000, min: 20000, max: 600000 }
    };

    // 2. 共通変数：ダメージ割合
    const dmgRate = target.hp > 0 ? (curDmg / target.hp) : 0;

    // 3. GP計算 (端数切り捨て)
    const resGPPerTime = Math.floor(target.gp * dmgRate);
    const totalGP = resGPPerTime * boost;

    // 4. スコア計算 (四捨五入で段階的に計算)
    const baseScore = Math.round(((config[simMode].base - config[simMode].min) * dmgRate) + config[simMode].min);
    const scoreWithBonus = Math.round(baseScore * bonusRate);
    const resScorePerTime = Math.min(scoreWithBonus, config[simMode].max);
    const totalScore = resScorePerTime * boost;
    const scorePerTicket = target.ticket > 0 ? Math.floor(resScorePerTime / target.ticket) : 0;

    // 5. 表示更新
    document.getElementById('current_rate').value = (dmgRate * 100).toFixed(1);

    // 比較ロジック
    const modeNames = { N: "ノーマル", H: "ハード", VH: "ベリーハード" };
    let compareText = "";
    const nMaxEff = Math.floor(config.N.max / CONFIG.stats.N.ticket);
    const hMaxEff = Math.floor(config.H.max / CONFIG.stats.H.ticket);
    
    if (simMode === "H") {
        const diffN = nMaxEff > 0 ? (scorePerTicket / nMaxEff * 100).toFixed(1) : "0";
        compareText = `<p>ノーマル最大効率比: <strong>${diffN}%</strong></p>`;
    } else if (simMode === "VH") {
        const diffN = nMaxEff > 0 ? (scorePerTicket / nMaxEff * 100).toFixed(1) : "0";
        const diffH = hMaxEff > 0 ? (scorePerTicket / hMaxEff * 100).toFixed(1) : "0";
        compareText = `<p>ノーマル最大効率比: <strong>${diffN}%</strong><br>ハード最大効率比: <strong>${diffH}%</strong></p>`;
    }

    // ★重要：ここで確実に HTML を注入します
    const resultDiv = document.getElementById('sim_result');
    resultDiv.innerHTML = `
        <p><strong>判定結果: ${modeNames[simMode]} (ブースト×${boost})</strong></p>
        <ul>
            <li>ダメージ率: <strong>${(dmgRate * 100).toFixed(1)}%</strong></li>
            <li>合計獲得GP: <strong>${formatNum(totalGP)} pt (${formatNum(resGPPerTime)} pt)</strong></li>
            <li>合計獲得スコア: <strong>${formatNum(totalScore)} (${formatNum(resScorePerTime)})</strong></li>
            <li>効率(1枚あたり): <strong>${formatNum(scorePerTicket)}</strong></li>
        </ul>
        ${compareText}`;
}

    init();
</script>

</body>
</html>
