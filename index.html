<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ダメージシミュレーター</title>
    <style>
        :root { --primary-color: #2563eb; --bg-color: #f8fafc; --card-bg: #ffffff; --text-color: #1e293b; --border-color: #e2e8f0; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--bg-color); color: var(--text-color); line-height: 1.6; margin: 0; }
        .sticky-header { position: sticky; top: 0; z-index: 100; background-color: var(--bg-color); padding: 20px 20px 10px 20px; box-shadow: 0 4px 6px -4px rgba(0,0,0,0.1); }
        .container { max-width: 800px; margin: 0 auto; padding: 0 20px 20px 20px; }
        .card { background: var(--card-bg); padding: 24px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
        .styled-input { width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; box-sizing: border-box; font-size: 0.95rem; }
        .result-box { background: #eff6ff; border: 1px solid #bfdbfe; padding: 20px; border-radius: 8px; margin-top: 20px; }
        .highlight { font-weight: bold; color: var(--primary-color); }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; background: #e2e8f0; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid var(--border-color); }
        th { background: #f1f5f9; }
    </style>
</head>
<body>

<div class="sticky-header">
    <div class="container">
        <header><h1>カゲマス 討伐イベント ダメージシミュレーター</h1></header>
        <div class="card">
            <h2>1. ボスHP・ボーナス設定</h2>
            <div class="grid">
                <div class="input-group">
                    <label>ボーナススコア (%)</label>
                    <input type="text" id="bonus" class="styled-input" value="0" oninput="updateAll()">
                </div>
            </div>
        </div>
    </div>
</div>

<div class="container">
    <div class="card">
        <h2>2. 現在の火力シミュレーション</h2>
        <div class="grid">
            <div class="input-group">
                <label>現在の挑戦難易度</label>
                <select id="sim_mode" class="styled-input" onchange="updateAll()">
                    <option value="H">ハード</option>
                    <option value="VH" selected>ベリーハード</option>
                </select>
            </div>
            <div class="input-group">
                <label>与ダメージ量</label>
                <input type="text" id="current_dmg" class="styled-input" oninput="updateAll()">
            </div>
        </div>
        <div id="sim_result" class="result-box">データを読み込んでいます...</div>
    </div>
</div>

<script>
    const CONFIG = {
        stats: {
            H:  { ticket: 90,  gp: 250,  score: 85000 },
            VH: { ticket: 120, gp: 1100, score: 300000 }
        }
    };

    let bossData = null;

    async function init() {
        try {
            const response = await fetch('boss_data.json');
            if (!response.ok) throw new Error();
            bossData = await response.json();
            updateAll();
        } catch (e) {
            document.getElementById('sim_result').innerHTML = "<p style='color:red;'>エラー: boss_data.jsonが見つかりません。</p>";
        }
    }

    function parseNum(str) { return parseFloat(str.replace(/,/g, '')) || 0; }

    function calculate() {
        if (!bossData) return;
        const bonus = (parseNum(document.getElementById('bonus').value) / 100) + 1;
        const curDmg = parseNum(document.getElementById('current_dmg').value);
        const simMode = document.getElementById('sim_mode').value;
        
        const targetHp = bossData[simMode].hp;
        const stats = CONFIG.stats[simMode];
        
        const dmgRate = targetHp > 0 ? (curDmg / targetHp) : 0;
        const rawScore = stats.score * dmgRate * bonus;
        const resScore = Math.min(rawScore, stats.score * 2);
        
        document.getElementById('sim_result').innerHTML = `
            <p><strong>判定結果: ${simMode === 'H' ? 'ハード' : 'ベリーハード'}</strong></p>
            <ul>
                <li>ダメージ率: ${(dmgRate * 100).toFixed(1)}%</li>
                <li>獲得スコア: ${Math.floor(resScore).toLocaleString()}</li>
            </ul>
        `;
    }

    function updateAll() { calculate(); }
    init();
</script>
</body>
</html>
